<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>are we?™</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(170deg, #cc5a4e 0%, #b84840 30%, #a03a34 55%, #8c3230 80%, #742a24 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .brand {
      font-size: 32px;
      font-weight: 400;
      color: #f5e6e0;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .brand .tm {
      font-size: 10px;
      vertical-align: super;
    }

    .message {
      font-size: 20px;
      font-weight: 700;
      margin: 24px 0 8px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 32px;
    }

    .form {
      display: flex;
      gap: 8px;
      align-items: stretch;
      margin-bottom: 12px;
    }

    .input {
      flex: 1;
      min-width: 0;
      background: rgba(255,255,255,0.12);
      border: 0.5px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      padding: 14px 18px;
      color: #ffffff;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .input:focus {
      border-color: rgba(255,255,255,0.5);
    }

    .submit {
      background: rgba(255,255,255,0.55);
      color: #B5473A;
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      -webkit-appearance: none;
      appearance: none;
    }

    .submit:active {
      transform: scale(0.97);
    }

    .fine {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      margin: 0;
    }

    .social {
      margin-top: 32px;
      text-align: center;
    }

    .social a {
      display: inline-block;
      color: #ffffff;
      opacity: 0.5;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }

    .social a:hover {
      opacity: 0.75;
    }

    .social svg {
      display: block;
      width: 22px;
      height: 22px;
    }

    .status {
      display: none;
      font-size: 14px;
      color: #ffffff;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .status.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">are we<span class="tm">™</span></div>
    <p class="message">you've got a question waiting</p>
    <p class="subtitle">because someone had to ask 👀</p>

    <form class="form" id="notify-form" novalidate>
      <input
        class="input"
        id="notify-email"
        type="email"
        inputmode="email"
        autocomplete="email"
        placeholder="your@email.com"
        required
      >
      <button class="submit" type="submit">notify me</button>
    </form>

    <p class="status" id="notify-status">you're on the list. we'll ping you at launch.</p>
    <p class="fine">no spam. just the launch ping.</p>

    <div class="social">
      <a href="https://www.instagram.com/arewe.app" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.163c3.204 0 3.584.012 4.849.07 3.253.149 4.772 1.691 4.92 4.92.058 1.265.069 1.644.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.226-1.664 4.771-4.92 4.92-1.266.058-1.644.07-4.849.07-3.204 0-3.584-.012-4.849-.07-3.26-.15-4.772-1.699-4.92-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.205.013-3.584.07-4.849.149-3.227 1.664-4.771 4.92-4.92 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072C2.695.272.273 2.69.073 7.052.015 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947C23.728 2.695 21.31.273 16.948.073 15.668.015 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
        </svg>
      </a>
    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById('notify-form');
      var emailInput = document.getElementById('notify-email');
      var status = document.getElementById('notify-status');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = emailInput.value.trim();
        if (!email) return;
        // TODO: replace with real backend (Supabase/Resend/etc.)
        try {
          var list = JSON.parse(localStorage.getItem('arewe_notify') || '[]');
          if (list.indexOf(email) === -1) list.push(email);
          localStorage.setItem('arewe_notify', JSON.stringify(list));
        } catch (err) {}
        emailInput.value = '';
        status.classList.add('show');
      });
    })();
  </script>
</body>
</html>
