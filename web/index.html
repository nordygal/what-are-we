<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>are we?™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      --primary: #cc5a4e;
      --text: #f5e6e0;
      --muted: rgba(255,255,255,0.55);
      --subtle: rgba(255,255,255,0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background-color: #742a24;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      /* Radial coral gradient — darkest stop matches the app palette
         (Colors.gradientColors end = #742a24). */
      background:
        radial-gradient(ellipse 120% 90% at 50% 45%,
          #cc5a4e 0%,
          #b84840 35%,
          #8c3230 75%,
          #742a24 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      padding: 32px 24px 24px;
    }

    /* ——— stagger-fade animation ——— */
    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(32px);
        filter: blur(6px);
      }
      60% {
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }
    .fade {
      opacity: 0;
      will-change: opacity, transform, filter;
      animation: fadeUp 1.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .d1 { animation-delay: 0.20s; }
    .d2 { animation-delay: 0.50s; }
    .d3 { animation-delay: 0.90s; }
    .d4 { animation-delay: 1.25s; }
    .d5 { animation-delay: 1.55s; }
    .d6 { animation-delay: 1.75s; }
    .d7 { animation-delay: 1.95s; }

    @media (prefers-reduced-motion: reduce) {
      .fade { opacity: 1; animation: none; }
    }

    /* ——— brand header (same as app Header.tsx, scaled up) ——— */
    .brand {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(29px, 4vw, 38px);
      text-align: center;
      color: var(--text);
      line-height: 1;
    }
    .brand .tm {
      font-size: 0.3em;
      position: relative;
      top: -1.3em; /* top-aligned with the 'are we' cap height */
      margin-left: 2px;
    }

    /* ——— headline block ——— */
    main {
      /* Explicit top padding only; footer margin-top owns the bottom gap
         so the IG icon sits directly under the email cluster rather than
         getting pinned to the viewport bottom. */
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-top: clamp(80px, 18vh, 170px);
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(38px, 5.4vw, 72px);
      line-height: 1.1;
      color: #ffffff;
      max-width: 18ch;
      margin: 0 auto;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(14px, 1.5vw, 17px);
      color: var(--muted);
      margin-top: clamp(18px, 2.5vw, 28px);
    }

    /* ——— footer / email form ——— */
    footer {
      /* Flows naturally under the headline block with a controlled gap —
         no margin-top:auto so IG stays directly under the email text
         instead of getting flung to the viewport bottom. */
      margin-top: clamp(56px, 14vh, 144px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .form {
      display: flex;
      align-items: baseline;
      gap: 16px;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      padding: 0 8px;
    }

    .input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.35);
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      padding: 10px 0;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.2s ease;
    }
    .input::placeholder {
      font-family: 'DM Sans', sans-serif;
      color: rgba(255,255,255,0.5);
    }
    .input:focus {
      border-bottom-color: rgba(255,255,255,0.7);
    }

    .submit {
      background: transparent;
      border: none;
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      padding: 10px 0;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.01em;
      transition: opacity 0.2s ease;
    }
    .submit:hover { opacity: 0.8; }
    .submit:active { opacity: 0.6; }
    .submit:disabled { opacity: 0.5; cursor: default; }

    .fine {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: var(--subtle);
      text-align: center;
    }

    .coming {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: 2px;
    }

    .social {
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }
    .social a {
      color: #ffffff;
      opacity: 0.5;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }
    .social a:hover { opacity: 0.9; }
    .social svg {
      display: block;
      width: 24px;
      height: 24px;
    }

    .status {
      display: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #ffffff;
      text-align: center;
    }
    .status.show { display: block; }

    /* ——— mobile tuning ——— */
    @media (max-width: 560px) {
      body {
        padding: 24px 20px 20px;
      }
      main {
        padding-top: clamp(72px, 13vh, 120px);
      }
      footer {
        margin-top: clamp(60px, 12vh, 112px);
      }
      .headline {
        max-width: 12ch;
      }
      .form {
        max-width: 300px;
        gap: 12px;
      }
      .input, .submit {
        font-size: 15px;
      }
    }

    @media (max-width: 380px) {
      body {
        padding: 20px 16px 18px;
      }
      .form {
        max-width: 100%;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <header class="brand fade d1">are we<span class="tm">™</span></header>

  <main>
    <h1 class="headline fade d2">you've got a question waiting</h1>
    <p class="subtitle fade d3">because someone had to ask 👀</p>
  </main>

  <footer>
    <form class="form fade d4" id="notify-form" novalidate>
      <input
        class="input"
        id="notify-email"
        type="email"
        inputmode="email"
        autocomplete="email"
        placeholder="your@email.com"
        required
      >
      <button class="submit" type="submit">notify me</button>
    </form>

    <p class="status" id="notify-status">you're on the list. we'll ping you at launch.</p>
    <p class="fine fade d5">no spam. just the launch ping.</p>
    <p class="coming fade d6">iOS &amp; Android. launching soon.</p>

    <div class="social fade d7">
      <a href="https://www.instagram.com/arewe.app" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.163c3.204 0 3.584.012 4.849.07 3.253.149 4.772 1.691 4.92 4.92.058 1.265.069 1.644.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.226-1.664 4.771-4.92 4.92-1.266.058-1.644.07-4.849.07-3.204 0-3.584-.012-4.849-.07-3.26-.15-4.772-1.699-4.92-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.205.013-3.584.07-4.849.149-3.227 1.664-4.771 4.92-4.92 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072C2.695.272.273 2.69.073 7.052.015 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947C23.728 2.695 21.31.273 16.948.073 15.668.015 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
        </svg>
      </a>
    </div>
  </footer>

  <script>
    (function () {
      var SUPABASE_URL = 'https://bnmhywuyxdtfwuqbcxaw.supabase.co';
      var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJubWh5d3V5eGR0Znd1cWJjeGF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDM4MTgsImV4cCI6MjA5MTE3OTgxOH0.UN3dG3-T3AwI-Ip2clWI2F2EfnZbe9c0OZ1U5bFTXFg';

      var form = document.getElementById('notify-form');
      var emailInput = document.getElementById('notify-email');
      var status = document.getElementById('notify-status');
      var submitBtn = form.querySelector('.submit');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var email = emailInput.value.trim().toLowerCase();
        if (!email || email.indexOf('@') === -1) return;

        submitBtn.disabled = true;
        submitBtn.textContent = '...';

        try {
          var res = await fetch(SUPABASE_URL + '/rest/v1/email_signups', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
              email: email,
              user_agent: navigator.userAgent,
              source: 'arewe.app'
            })
          });

          if (res.ok || res.status === 409) {
            emailInput.value = '';
            status.classList.add('show');
          } else {
            status.textContent = "something's off. try again?";
            status.classList.add('show');
          }
        } catch (err) {
          status.textContent = "can't reach the server. try again?";
          status.classList.add('show');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'notify me';
        }
      });
    })();
  </script>
</body>
</html>
