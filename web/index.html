<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>are we?™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      --primary: #cc5a4e;
      --primary-dark: #742a24;
      --text: #f5e6e0;
      --muted: rgba(255,255,255,0.55);
      --frosted: rgba(255,255,255,0.14);
      --frosted-border: rgba(255,255,255,0.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(170deg, #cc5a4e 0%, #b84840 30%, #a03a34 55%, #8c3230 80%, #742a24 100%);
      background-attachment: fixed;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      padding: 20px;
      color: var(--text);
    }

    .card {
      background: var(--frosted);
      border: 1px solid var(--frosted-border);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--text);
    }

    .brand .tm {
      font-size: 11px;
      position: relative;
      top: -14px;
      margin-left: 1px;
    }

    .message {
      font-family: 'DM Sans', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      margin: 28px 0 6px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .form {
      display: flex;
      gap: 8px;
      align-items: stretch;
      margin-bottom: 14px;
    }

    .input {
      flex: 1;
      min-width: 0;
      background: var(--frosted);
      border: 1px solid var(--frosted-border);
      border-radius: 999px;
      padding: 14px 18px;
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.15s ease;
    }

    .input::placeholder {
      color: rgba(255,255,255,0.45);
    }

    .input:focus {
      border-color: rgba(255,255,255,0.35);
    }

    .submit {
      background: #ffffff;
      color: var(--primary);
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      -webkit-appearance: none;
      appearance: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .submit:active { transform: scale(0.97); }

    .submit:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .fine {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      text-align: center;
      font-style: italic;
    }

    .status {
      display: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .status.show { display: block; }

    .social {
      margin-top: 32px;
      text-align: center;
    }

    .social a {
      display: inline-block;
      color: #ffffff;
      opacity: 0.5;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }

    .social a:hover { opacity: 0.75; }

    .social svg {
      display: block;
      width: 22px;
      height: 22px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">are we<span class="tm">™</span></div>
    <p class="message">you've got a question waiting</p>
    <p class="subtitle">because someone had to ask 👀</p>

    <form class="form" id="notify-form" novalidate>
      <input
        class="input"
        id="notify-email"
        type="email"
        inputmode="email"
        autocomplete="email"
        placeholder="your@email.com"
        required
      >
      <button class="submit" type="submit">notify me</button>
    </form>

    <p class="status" id="notify-status">you're on the list. we'll ping you at launch.</p>
    <p class="fine">no spam. just the launch ping.</p>

    <div class="social">
      <a href="https://www.instagram.com/arewe.app" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.163c3.204 0 3.584.012 4.849.07 3.253.149 4.772 1.691 4.92 4.92.058 1.265.069 1.644.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.226-1.664 4.771-4.92 4.92-1.266.058-1.644.07-4.849.07-3.204 0-3.584-.012-4.849-.07-3.26-.15-4.772-1.699-4.92-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.205.013-3.584.07-4.849.149-3.227 1.664-4.771 4.92-4.92 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072C2.695.272.273 2.69.073 7.052.015 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947C23.728 2.695 21.31.273 16.948.073 15.668.015 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
        </svg>
      </a>
    </div>
  </div>

  <script>
    (function () {
      var SUPABASE_URL = 'https://bnmhywuyxdtfwuqbcxaw.supabase.co';
      var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJubWh5d3V5eGR0Znd1cWJjeGF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MDM4MTgsImV4cCI6MjA5MTE3OTgxOH0.UN3dG3-T3AwI-Ip2clWI2F2EfnZbe9c0OZ1U5bFTXFg';

      var form = document.getElementById('notify-form');
      var emailInput = document.getElementById('notify-email');
      var status = document.getElementById('notify-status');
      var submitBtn = form.querySelector('.submit');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var email = emailInput.value.trim().toLowerCase();
        if (!email || email.indexOf('@') === -1) return;

        submitBtn.disabled = true;
        submitBtn.textContent = '...';

        try {
          var res = await fetch(SUPABASE_URL + '/rest/v1/email_signups', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
              email: email,
              user_agent: navigator.userAgent,
              source: 'arewe.app'
            })
          });

          if (res.ok || res.status === 409) {
            emailInput.value = '';
            status.classList.add('show');
          } else {
            status.textContent = "something's off. try again?";
            status.classList.add('show');
          }
        } catch (err) {
          status.textContent = "can't reach the server. try again?";
          status.classList.add('show');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'notify me';
        }
      });
    })();
  </script>
</body>
</html>
